name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run Go tests
        run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install extension dependencies
        run: cd extension && npm install
      - name: Run extension tests
        run: cd extension && npm test
      - name: Type check
        run: cd extension && npx tsc --noEmit

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve version
        id: version
        run: echo "value=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build extension
        run: |
          cd extension
          npm install
          npm run build

      - name: Package extension
        run: |
          mkdir -p dist
          # Versioned zip; goreleaser ships it via release.extra_files.
          ( cd extension/dist && zip -r - . ) > "dist/piercode-extension_${{ steps.version.outputs.value }}.zip"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
