name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run Go tests
        run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install extension dependencies
        run: cd extension && npm install
      - name: Run extension tests
        run: cd extension && npm test
      - name: Type check
        run: cd extension && npx tsc --noEmit

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build extension
        run: |
          cd extension
          npm install
          npm run build

      - name: Package extension
        run: zip -r extension.zip extension/dist/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload extension to release
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          gh release upload $VERSION extension.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        run: |
          echo "## 📦 PierCode Release" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 🚀 What's New" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> RELEASE_NOTES.md 2>/dev/null || echo "- Initial release" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 📥 Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- **Backend**: Download the appropriate package for your OS" >> RELEASE_NOTES.md
          echo "- **Chrome Extension**: extension.zip" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 🔧 Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "# Windows" >> RELEASE_NOTES.md
          echo "Invoke-WebRequest -Uri https://raw.githubusercontent.com/Sirhap/PierCode/main/install.ps1 | Invoke-Expression" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md

      - name: Update release notes
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          gh release edit $VERSION --notes-file RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
