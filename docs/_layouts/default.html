<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- jekyll-seo-tag emits <title>, meta description, canonical, Open Graph,
       Twitter card, and SoftwareApplication/WebSite JSON-LD from _config.yml
       and each page's front matter. -->
  {% seo %}

  <meta name="robots" content="index, follow">
  <meta name="keywords" content="{{ page.keywords | default: 'PierCode, local AI assistant, AI coding agent, Chrome extension, ChatGPT local filesystem, Claude code execution, Gemini local server, Qwen tools, browser AI proxy, sandboxed code execution, Go server, Manifest V3, MCP alternative, web AI to local' }}">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="{{ '/sitemap.xml' | relative_url }}">

  <!-- Explicit SoftwareApplication structured data for rich results. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "PierCode",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Windows, macOS, Linux",
    "description": "Local AI assistant proxy connecting web-based AI (ChatGPT, Claude, Gemini, Qwen, Kimi) to your local filesystem and browser through a Chrome extension and a sandboxed Go server.",
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "codeRepository": "https://github.com/{{ site.repository }}",
    "programmingLanguage": ["Go", "TypeScript"],
    "license": "https://github.com/{{ site.repository }}/blob/master/LICENSE",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <style>
    body { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292f; }
    pre, code { background: #f6f8fa; border-radius: 6px; }
    pre { padding: 1rem; overflow-x: auto; }
    code { padding: 0.2em 0.4em; }
    pre code { padding: 0; background: none; }
    a { color: #0969da; }
    h1, h2, h3 { line-height: 1.25; }
    img { max-width: 100%; }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
  <footer style="margin-top:3rem;padding-top:1rem;border-top:1px solid #d0d7de;font-size:0.9rem;color:#57606a">
    <a href="https://github.com/{{ site.repository }}">PierCode on GitHub</a>
  </footer>
</body>
</html>
